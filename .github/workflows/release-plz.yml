name: Release PLZ

on:
  push:
    branches:
      - main

# Prevent concurrent releases stomping on each other
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

permissions:
  pull-requests: write  # open/update the release PR
  contents: write       # push tags + create GitHub releases

jobs:
  release-plz:
    name: Release PLZ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT required so that PRs/tags created by release-plz trigger CI workflows.
          # GITHUB_TOKEN-created events are explicitly blocked from triggering further runs.
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
